<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radial cluster + rose (ink paper)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
  <style>
    :root {
      --ink: #2a261f;
      --ink-dim: #5c5548;
      --accent: #8b4a32;
      --gold: #9a6b3f;
      --border: rgba(45, 35, 22, 0.22);
      --panel-bg: rgba(255, 252, 245, 0.42);
      --code-bg: rgba(90, 70, 45, 0.08);
      /* Square #chart: limit by narrower of column vs viewport height (fit whole viz) */
      --chart-max-side: 1100px;
      --chart-viewport-chrome-y: calc(
        1.2rem + 2rem + env(safe-area-inset-top, 0px) + env(safe-area-inset-bottom, 0px)
      );
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { min-height: 100%; }
    #canvas-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    #grain-svg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.055;
      mix-blend-mode: multiply;
    }
    body {
      margin: 0;
      min-height: 100vh;
      /* 与 canvas 渐变末端一致，略暗、略泛黄 */
      background: #d8c8b2;
      color: var(--ink);
      font-family: "JetBrains Mono", monospace;
      line-height: 1.5;
    }
    .wrap {
      position: relative;
      z-index: 4;
      max-width: 1100px;
      margin: 0 auto;
      /* padding: 1.75rem 1.2rem 2.25rem; */
    }
    .sub code {
      background: var(--code-bg);
      padding: 0.06em 0.32em;
      border-radius: 3px;
      font-size: 0.92em;
    }
    .sub {
      margin: 0.35rem 0 0;
      max-width: 52rem;
      font-size: 0.9rem;
      color: var(--ink-dim);
    }
    .panel {
      /* margin-top: 1.2rem; */
      /* border: 1px solid var(--border); */
      border-radius: 6px;
      /* background: var(--panel-bg); */
      /* box-shadow: 0 2px 24px rgba(40, 30, 18, 0.07); */
      /* backdrop-filter: blur(3px); */
      /* -webkit-backdrop-filter: blur(3px); */
      overflow: hidden;
    }
    #chart {
      display: block;
      margin: 0 auto;
      /* viewBox is square: width drives height (height: auto). Cap width by shortest usable viewport edge. */
      width: min(
        100%,
        var(--chart-max-side),
        calc(100vh - var(--chart-viewport-chrome-y))
      );
      max-width: 100%;
      height: auto;
      touch-action: none;
      cursor: default;
      overflow: hidden;
    }
    @supports (height: 100svh) {
      #chart {
        width: min(
          100%,
          var(--chart-max-side),
          calc(100svh - var(--chart-viewport-chrome-y))
        );
      }
    }
    /* Wider than tall: match #canvas-bg (full viewport height); width follows square, capped by column */
    @media (min-aspect-ratio: 1/1) {
      #chart {
        width: auto;
        max-width: min(100%, var(--chart-max-side));
        height: 100vh;
        aspect-ratio: 1 / 1;
      }
    }
    @supports (height: 100dvh) {
      @media (min-aspect-ratio: 1/1) {
        #chart {
          height: 100dvh;
        }
      }
    }
    /* cursor: default until zoomed; then "move" set from JS on #chart */
    /* legend-row disabled
    .legend-row {
      margin-top: 0.85rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1.25rem;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }
    .legend-row h3 {
      width: 100%;
      margin: 0 0 0.25rem;
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      color: var(--gold);
      font-weight: 500;
    }
    */
    .sw {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-right: 0.75rem;
      margin-bottom: 0.25rem;
    }
    .leader-bound-arc-year {
      font-family: "JetBrains Mono", monospace;
      font-size: 10.5px;
      font-weight: 500;
      fill: rgba(42, 36, 28, 0.82);
    }
    .sw i {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      display: inline-block;
    }
    /* legend-distance swatches disabled (was inside legend-row)
    .legend-dist-sw {
      cursor: pointer;
      border-radius: 3px;
      padding: 0.12rem 0.28rem;
      margin-right: 0.45rem;
      margin-bottom: 0.2rem;
      transition: background 0.12s ease, outline 0.12s ease;
      outline: 1px solid transparent;
    }
    .legend-dist-sw:hover {
      background: rgba(139, 74, 50, 0.1);
    }
    .legend-dist-sw.is-selected {
      outline: 1px solid rgba(139, 74, 50, 0.45);
      background: rgba(154, 107, 63, 0.14);
      color: var(--ink);
    }
    */
    /** Country ring vertices (match Radial-area-chart). */
    #chart g.country-vertices g.vertex {
      cursor: crosshair;
    }
    #chart g.country-vertices g.vertex:hover .vertex-line {
      stroke-width: 2.35px;
    }
    #chart g.yin-yang-embed .rose-slice {
      stroke: none;
      cursor: crosshair;
    }
    #chart g.yin-yang-embed .rose-center { pointer-events: none; text-anchor: middle; }
    /* ── Rose-center text: one font size for all lines ──────────────────
       Toggle EVERYTHING by changing the single font-size below (currently 9px).
       To make individual lines different, override font-size on each rule.     */
    #chart g.yin-yang-embed .rose-center .c-year,
    #chart g.yin-yang-embed .rose-center .c-sub,
    #chart g.yin-yang-embed .rose-center .c-focus,
    #chart g.yin-yang-embed .rose-center .c-total {
      font-size: 10px;
      font-weight: 400;
      fill: #3d3a36;
    }
    /* Leader name: color set per-hover in JS (office color); bold weight here */
    #chart g.yin-yang-embed .rose-center .c-focus { font-weight: 600; }
    /* Stops line: bold */
    #chart g.yin-yang-embed .rose-center .c-total { font-weight: 600; }
    #chart g.yin-yang-embed .rose-center .c-line { font-size: 9.5px; fill: #3d3a36; }
    #chart g.yin-yang-embed .rose-center .c-hint { font-size: 8.5px; fill: #7a756d; }
    #chart g.yin-yang-embed g.rose-vertices g.vertex { cursor: crosshair; }
    #chart g.yin-yang-embed g.rose-vertices g.vertex:hover .vertex-line { stroke-width: 2.35px; }
    #chart g.yin-yang-embed path.rose-tip-cap {
      pointer-events: none;
      stroke: none;
    }
    /* ── Country search widget ──────────────────────────────────────── */
    .country-search-wrap {
      position: absolute;
      top: 0.65rem;
      right: 0.65rem;
      z-index: 20;
      width: 200px;
      font-family: "JetBrains Mono", monospace;
    }
    .country-search-inner {
      position: relative;
      display: flex;
      align-items: center;
    }
    .country-search-input {
      width: 100%;
      padding: 0.38rem 2rem 0.38rem 0.6rem;
      background: rgba(255, 250, 240, 0.88);
      border: 1px solid rgba(174, 145, 125, 0.5);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.65rem;
      letter-spacing: 0.04em;
      color: var(--ink);
      outline: none;
      box-shadow: 0 2px 12px rgba(40, 28, 18, 0.09);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      transition: border-color 0.14s ease, box-shadow 0.14s ease;
    }
    /* Hide native clear on type="search" (Chrome/Safari blue ✕); we use #country-search-clear. */
    .country-search-input::-webkit-search-cancel-button,
    .country-search-input::-webkit-search-decoration {
      -webkit-appearance: none;
      appearance: none;
    }
    .country-search-input::-ms-clear {
      display: none;
      width: 0;
      height: 0;
    }
    .country-search-input::placeholder { color: var(--ink-dim); }
    .country-search-input:focus {
      border: 3px solid rgba(139, 74, 50, 0.62);
      box-shadow:
        0 2px 8px rgba(139, 74, 50, 0.12),
        0 10px 28px rgba(40, 28, 18, 0.16);
    }
    .country-search-clear {
      position: absolute;
      right: 0.38rem;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink-dim);
      font-size: 0.75rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.7;
      transition: opacity 0.1s ease;
    }
    .country-search-clear:hover { opacity: 1; color: var(--accent); }
    .country-search-clear.hidden { display: none; }
    .country-search-suggestions {
      position: absolute;
      top: calc(100% + 3px);
      left: 0;
      right: 0;
      background: rgba(255, 250, 240, 0.97);
      border: 1px solid rgba(90, 60, 40, 0.22);
      border-radius: 4px;
      box-shadow: 0 6px 20px rgba(40, 28, 18, 0.14);
      list-style: none;
      margin: 0;
      padding: 0.2rem 0;
      max-height: 220px;
      overflow-y: auto;
      z-index: 30;
    }
    .country-search-suggestions.hidden { display: none; }
    .country-search-suggestions li {
      padding: 0.32rem 0.65rem;
      font-size: 0.63rem;
      letter-spacing: 0.03em;
      color: var(--ink);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .country-search-suggestions li:hover,
    .country-search-suggestions li.active {
      background: rgba(139, 74, 50, 0.1);
      color: var(--accent);
    }
    .country-search-suggestions li.no-result {
      color: var(--ink-dim);
      cursor: default;
      font-style: italic;
    }
    .country-search-suggestions li.no-result:hover { background: none; color: var(--ink-dim); }
    /* Narrow screens: search box sits below the panel, full width */
    @media (max-aspect-ratio: 1/1) {
      .country-search-wrap {
        --cs-pad: clamp(1.1rem, 14vw, 2.35rem);
        position: relative;
        width: 100%;
        max-width: min(100%, var(--chart-max-side));
        margin: 0.55rem auto 0;
        padding-inline: 0;
        box-sizing: border-box;
        display: block;
      }
      .country-search-wrap .country-search-inner {
        padding-inline: var(--cs-pad);
        box-sizing: border-box;
      }
      .country-search-wrap .country-search-suggestions {
        left: var(--cs-pad);
        right: var(--cs-pad);
        width: auto;
        box-sizing: border-box;
      }
      .country-search-wrap .country-search-input {
        background: rgba(255, 250, 240, 0.72);
      }
    }
    /* ── End country search ─────────────────────────────────────────── */

    #tip {
      position: fixed;
      z-index: 50;
      pointer-events: none;
      max-width: min(300px, calc(100vw - 20px));
      padding: 0.75rem 0.9rem;
      border: 1px solid rgba(90, 60, 40, 0.28);
      background: rgba(255, 250, 240, 0.97);
      border-radius: 4px;
      box-shadow: 0 8px 28px rgba(40, 28, 18, 0.18);
      font-size: 0.74rem;
      line-height: 1.4;
      color: var(--ink);
      opacity: 0;
      transition: opacity 0.1s ease;
    }
    #tip.visible { opacity: 1; }
    /* Inline strong so e.g. country + " · continent" stay on one line */
    #tip strong { color: var(--accent); display: inline; font-size: 0.88rem; font-weight: 500; }
    #tip .meta {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.64rem;
      color: var(--ink-dim);
      margin-top: 0.35rem;
    }
    #tip .meta-extra {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.58rem;
      color: #5a5a5a;
      margin-top: 0.5rem;
    }

    /* ── Legend “How to read” help (fixed top-left) ───────────────────── */
    .legend-help-btn {
      position: fixed;
      z-index: 25;
      top: calc(0.6rem + env(safe-area-inset-top, 0px));
      left: calc(0.6rem + env(safe-area-inset-left, 0px));
      display: flex;
      flex-direction: row;
      align-items: center;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: "JetBrains Mono", monospace;
      color: var(--ink);
    }
    .legend-help-icon-wrap {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(255, 250, 240, 0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 10px rgba(40, 28, 18, 0.12);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .legend-help-btn:hover .legend-help-icon-wrap,
    .legend-help-btn:focus-visible .legend-help-icon-wrap {
      transform: scale(1.06);
      box-shadow: 0 4px 16px rgba(40, 28, 18, 0.2);
      border-color: rgba(139, 74, 50, 0.45);
    }
    .legend-help-label {
      margin-left: 0.35rem;
      padding: 0.32rem 0.55rem 0.32rem 0;
      font-size: clamp(0.5rem, 1.85vw, 0.68rem);
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-dim);
      white-space: nowrap;
      max-width: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateX(-4px);
      pointer-events: none;
      transition: max-width 0.28s ease, opacity 0.22s ease, transform 0.28s ease;
    }
    .legend-help-btn:hover .legend-help-label,
    .legend-help-btn:focus-visible .legend-help-label {
      max-width: 160px;
      opacity: 1;
      transform: translateX(0);
    }
    @media (max-width: 479px) {
      .legend-help-label {
        font-size: clamp(0.46rem, 2.8vw, 0.55rem);
        letter-spacing: 0.1em;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .legend-help-icon-wrap,
      .legend-help-label {
        transition: none;
      }
      .legend-help-btn:hover .legend-help-label,
      .legend-help-btn:focus-visible .legend-help-label {
        max-width: 160px;
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* ── Legend modal (highest stack) ────────────────────────────────── */
    .legend-modal {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(0.75rem, env(safe-area-inset-top)) max(0.75rem, env(safe-area-inset-right))
        max(0.75rem, env(safe-area-inset-bottom)) max(0.75rem, env(safe-area-inset-left));
    }
    .legend-modal.hidden {
      display: none;
    }
    .legend-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(22, 20, 16, 0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    /* Square from explicit min(vw,vh,cap) — avoids Safari flex + aspect-ratio + max-height bugs on resize. */
    .legend-modal-panel {
      position: relative;
      z-index: 1;
      width: min(92vw, 92vh, 920px);
      height: min(92vw, 92vh, 920px);
      min-height: 0;
      flex-shrink: 0;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(40, 28, 18, 0.38);
      border: 1px solid var(--border);
    }
    @supports (height: 100dvh) {
      .legend-modal-panel {
        width: min(92vw, 92dvh, 920px);
        height: min(92vw, 92dvh, 920px);
      }
    }
    .legend-modal-parchment {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8e1d6;
    }
    .legend-modal-grain {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.055;
      mix-blend-mode: multiply;
    }
    .legend-modal-panel img {
      position: relative;
      z-index: 1;
      display: block;
      box-sizing: border-box;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      object-position: center;
      background: transparent;
    }
    .legend-modal-close {
      position: absolute;
      top: 0.45rem;
      right: 0.45rem;
      z-index: 2;
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(255, 250, 240, 0.96);
      box-shadow: 0 2px 10px rgba(40, 28, 18, 0.12);
      cursor: pointer;
      font-family: "JetBrains Mono", monospace;
      font-size: 1.05rem;
      line-height: 1;
      color: var(--ink);
    }
    .legend-modal-close:hover {
      border-color: rgba(139, 74, 50, 0.5);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <canvas id="canvas-bg" aria-hidden="true"></canvas>
  <svg id="grain-svg" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <filter id="parchment-grain" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.72 0.68" numOctaves="4" seed="7" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="matrix"
        values="0.9 0.1 0   0 0
                0.1 0.8 0.1 0 0
                0   0.1 0.7 0 0
                0   0   0   1 0"
        in="noise"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#parchment-grain)"/>
  </svg>
  <button type="button" id="legend-help-btn" class="legend-help-btn" title="How to read">
    <span class="legend-help-icon-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.65" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <path stroke-linecap="round" d="M12 16v-5M12 8.25h.01"/>
      </svg>
    </span>
    <span class="legend-help-label">How to read</span>
  </button>
  <div class="wrap">
    <div class="panel">
      <svg id="chart" viewBox="-480 -480 960 960" overflow="hidden" role="img" aria-label="Radial cluster with rose chart center"></svg>
    </div>
    <!-- Country search: floats top-right on wide screens, static below panel on narrow -->
    <div class="country-search-wrap" id="country-search-wrap" aria-label="Search countries">
      <div class="country-search-inner">
        <input
          id="country-search-input"
          class="country-search-input"
          type="search"
          autocomplete="off"
          spellcheck="false"
          placeholder="Search country…"
          role="combobox"
          aria-autocomplete="list"
          aria-expanded="false"
          aria-controls="country-search-suggestions"
          aria-haspopup="listbox"
        />
        <button
          id="country-search-clear"
          class="country-search-clear hidden"
          aria-label="Clear selection"
          tabindex="-1"
        >✕</button>
      </div>
      <ul
        id="country-search-suggestions"
        class="country-search-suggestions hidden"
        role="listbox"
        aria-label="Country suggestions"
      ></ul>
    </div>
    <!-- legend-row disabled
    <div class="legend-row">
      <div>
        <h3>Leader (inner nodes)</h3>
        <span id="legend-leaders"></span>
      </div>
      <div>
        <h3>Continent (visits)</h3>
        <span id="legend-continents"></span>
      </div>
      <div>
        <h3>Distance rings (km)</h3>
        <span id="legend-distance"></span>
      </div>
    </div>
    -->
  </div>
  <div id="tip" role="tooltip" aria-live="polite"></div>

  <div id="legend-modal" class="legend-modal hidden">
    <div class="legend-modal-backdrop"></div>
    <div class="legend-modal-panel">
      <button type="button" class="legend-modal-close" id="legend-modal-close" title="Close">✕</button>
      <div class="legend-modal-parchment">
        <svg class="legend-modal-grain" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <filter id="parchment-grain-modal" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
            <feTurbulence type="fractalNoise" baseFrequency="0.72 0.68" numOctaves="4" seed="7" stitchTiles="stitch" result="noise"/>
            <feColorMatrix type="matrix"
              values="0.9 0.1 0   0 0
                      0.1 0.8 0.1 0 0
                      0   0.1 0.7 0 0
                      0   0   0   1 0"
              in="noise"/>
          </filter>
          <rect width="100%" height="100%" filter="url(#parchment-grain-modal)"/>
        </svg>
        <img src="img/legend.svg" alt="Legend — how to read the chart" width="1000" height="1000" />
      </div>
    </div>
  </div>

  <script>
  (function () {
    const modal = document.getElementById("legend-modal");
    const helpBtn = document.getElementById("legend-help-btn");
    const closeBtn = document.getElementById("legend-modal-close");
    const backdrop = modal && modal.querySelector(".legend-modal-backdrop");
    const panel = modal && modal.querySelector(".legend-modal-panel");
    if (!modal || !helpBtn || !closeBtn || !backdrop || !panel) return;
    function openLegendModal() {
      modal.classList.remove("hidden");
      document.body.style.overflow = "hidden";
    }
    function closeLegendModal() {
      modal.classList.add("hidden");
      document.body.style.overflow = "";
    }
    helpBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      openLegendModal();
    });
    closeBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      closeLegendModal();
    });
    backdrop.addEventListener("click", closeLegendModal);
    panel.addEventListener("click", (e) => e.stopPropagation());
  })();
  </script>

  <script>
  (function () {
    'use strict';
    const canvas = document.getElementById('canvas-bg');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    function mkRng(seed) {
      let s = seed >>> 0;
      return function () {
        s = Math.imul(s ^ (s >>> 15), 1 | s);
        s = (s + Math.imul(s ^ (s >>> 7), 61 | s)) ^ s;
        return ((s ^ (s >>> 14)) >>> 0) / 4294967296;
      };
    }
    function draw(W, H) {
      const rng = mkRng(0xC0FFEE17);
      const bg = ctx.createLinearGradient(0, 0, W * 0.88, H);
      bg.addColorStop(0.0, '#f4efe4');
      bg.addColorStop(0.28, '#ebe3d4');
      bg.addColorStop(0.52, '#e4d9c8');
      bg.addColorStop(0.78, '#ddcfbd');
      bg.addColorStop(1.0, '#d8c8b2');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      for (let i = 0; i < 8; i++) {
        const x = rng() * W, y = rng() * H;
        const r = W * (0.06 + rng() * 0.22);
        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
        const a = 0.012 + rng() * 0.028;
        g.addColorStop(0, `rgba(255, 250, 238, ${a})`);
        g.addColorStop(1, 'rgba(255, 250, 238, 0)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
      }
      ctx.restore();
      ctx.save();
      ctx.globalCompositeOperation = 'multiply';
      for (let i = 0; i < 6; i++) {
        const x = rng() * W, y = rng() * H;
        const r = Math.max(W, H) * (0.08 + rng() * 0.22);
        const asp = 0.35 + rng() * 0.65;
        const rot = rng() * Math.PI;
        const hue = 28 + rng() * 16;
        const a = 0.026 + rng() * 0.055;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(rot);
        ctx.scale(1, asp);
        const g = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
        g.addColorStop(0, `hsla(${hue}, 40%, 52%, ${a})`);
        g.addColorStop(0.42, `hsla(${hue}, 35%, 58%, ${a * 0.5})`);
        g.addColorStop(1, `hsla(${hue}, 30%, 64%, 0)`);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(0, 0, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.restore();
      const minerals = [
        { h: 214, s: 32, l: 62, count: 3, maxSize: 0.18, alpha: 0.038 },
        { h: 168, s: 26, l: 64, count: 3, maxSize: 0.16, alpha: 0.034 },
        { h: 22, s: 28, l: 66, count: 3, maxSize: 0.18, alpha: 0.041 },
        { h: 202, s: 22, l: 68, count: 2, maxSize: 0.12, alpha: 0.03 },
        { h: 12, s: 26, l: 68, count: 3, maxSize: 0.13, alpha: 0.035 },
        { h: 36, s: 22, l: 70, count: 2, maxSize: 0.14, alpha: 0.033 },
      ];
      ctx.save();
      ctx.globalCompositeOperation = 'multiply';
      minerals.forEach((m) => {
        for (let i = 0; i < m.count; i++) {
          const x = rng() * W, y = rng() * H;
          const r = Math.max(W, H) * (0.04 + rng() * m.maxSize);
          const asp = 0.28 + rng() * 0.8;
          const rot = rng() * Math.PI * 2;
          const dh = (rng() - 0.5) * 20;
          const a = m.alpha * (0.55 + rng() * 0.8);
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(rot);
          ctx.scale(1, asp);
          const g = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
          g.addColorStop(0, `hsla(${m.h + dh}, ${m.s}%, ${m.l}%, ${a})`);
          g.addColorStop(0.48, `hsla(${m.h + dh}, ${m.s}%, ${m.l + 5}%, ${a * 0.35})`);
          g.addColorStop(1, `hsla(${m.h + dh}, ${m.s - 8}%, ${m.l + 10}%, 0)`);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(0, 0, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      });
      ctx.restore();
      ctx.save();
      ctx.globalCompositeOperation = 'multiply';
      ctx.lineCap = 'round';
      const nFibers = Math.floor((W * H) / 1750);
      for (let i = 0; i < nFibers; i++) {
        const x = rng() * W, y = rng() * H;
        const len = 5 + rng() * 40;
        const angle = rng() * Math.PI * 2;
        const wobble = (rng() - 0.5) * 0.7;
        const alpha = 0.028 + rng() * 0.11;
        const width = 0.18 + rng() * 0.45;
        const fHue = rng() > 0.82 ? 8 + rng() * 18 : 27 + rng() * 20;
        const fL = 18 + rng() * 38;
        const fS = 28 + rng() * 45;
        ctx.strokeStyle = `hsla(${fHue}, ${fS}%, ${fL}%, ${alpha})`;
        ctx.lineWidth = width;
        const cx = x + Math.cos(angle + wobble) * len * 0.45 + (rng() - 0.5) * 7;
        const cy = y + Math.sin(angle + wobble) * len * 0.45 + (rng() - 0.5) * 7;
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.quadraticCurveTo(cx, cy, x + Math.cos(angle) * len, y + Math.sin(angle) * len);
        ctx.stroke();
      }
      ctx.restore();
      ctx.save();
      ctx.globalCompositeOperation = 'multiply';
      const nSpecks = Math.floor((W * H) / 300);
      for (let i = 0; i < nSpecks; i++) {
        const x = rng() * W, y = rng() * H;
        const sz = 0.3 + rng() * 0.9;
        const a = 0.012 + rng() * 0.065;
        ctx.fillStyle = rng() > 0.42 ? `rgba(42, 38, 32, ${a})` : `rgba(180, 175, 165, ${a * 0.4})`;
        ctx.fillRect(x, y, sz, sz);
      }
      ctx.restore();
      (function applyPixelGrain() {
        const imgData = ctx.getImageData(0, 0, Math.ceil(W), Math.ceil(H));
        const data = imgData.data;
        const grainRng = mkRng(0xFACE1234);
        for (let p = 0; p < data.length; p += 4) {
          const n = (grainRng() - 0.5) * 9.5;
          data[p] = Math.min(255, Math.max(0, data[p] + n));
          data[p + 1] = Math.min(255, Math.max(0, data[p + 1] + n * 0.8));
          data[p + 2] = Math.min(255, Math.max(0, data[p + 2] + n * 0.55));
        }
        ctx.putImageData(imgData, 0, 0);
      })();
    }
    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      const W = window.innerWidth;
      const H = window.innerHeight;
      canvas.width = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw(W, H);
    }
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resize, 200);
    });
    resize();
  })();
  </script>

  <script>
(function () {
  const svg = d3.select("#chart");
  const tip = document.getElementById("tip");

  const RADIUS = 420;
  const LINK_PAD = 30;
  const Y_OUT = RADIUS - LINK_PAD;

  const R_INNER = 3;
  /** Inner tour group-rect: uniform tangential + radial size. */
  const INNER_RECT_TANGENTIAL_H = R_INNER * 2;
  const INNER_RECT_RADIAL_BASE = R_INNER * 2.6;
  /** President vs Premier: two distinct reds (flat fill, no ink gradient). */
  const GROUP_RECT_FILL = { President: "#52796c", Premier: "#cc5d4e" };
  /**
   * Dotted radials: angles match **gaps between adjacent tour `group_rect`s** (same `d.x` sector layout),

   * Line length: inner r0 = yInner; outer r1 = last .rings — see drawLeaderIdBoundaryLines.
   */
  const LEADER_ID_BOUNDARY_YEARS = [1998, 2003, 2013];
  /** @墨点-三.html：rScale + HALO_RATIO + oScale；duration 映射到 val∈[1,8] */
  const LEAF_INK_HALO_RATIO = 1.25;

  /** Rose embed (560 design units) scaled to sit inside the radial inner void. */
  const YY_SCALE = 0.68;

  const LEADER_COLORS = {
    "Jiang Zemin": "#c6a756",
    "Hu Jintao": "#7d9a8c",
    "Xi Jinping": "#9c4c3a",
    "Wen Jiabao": "#6b8fbf",
    "Li Keqiang": "#a67cb5",
    "Zhu Rongji": "#8f9a6b",
  };

  const CONTINENT_COLORS = {
    Africa: "#dd9b4d",
    Americas: "#487280",
    Asia: "#a74713",
    Europe: "#6cb4a5",
    Oceania: "#606b8f",
  };

  function appendInkStyleDefs(defs) {
    const Lf = defs
      .append("filter")
      .attr("id", "ink-brush-line")
      .attr("x", "-15%")
      .attr("y", "-15%")

      .attr("height", "130%")
      .attr("color-interpolation-filters", "sRGB");

    Lf.append("feDisplacementMap")
      .attr("in", "SourceGraphic")
      .attr("in2", "ln")
      .attr("scale", 0.14)
      .attr("xChannelSelector", "R")
      .attr("yChannelSelector", "G")
      .attr("result", "ld");
    Lf.append("feGaussianBlur").attr("in", "ld").attr("stdDeviation", 0.18);
  }

  const LEADER_ROSTER = [
    { leader: "Jiang Zemin", office: "President" },
    { leader: "Hu Jintao", office: "President" },
    { leader: "Xi Jinping", office: "President" },
    { leader: "Zhu Rongji", office: "Premier" },
    { leader: "Wen Jiabao", office: "Premier" },
    { leader: "Li Keqiang", office: "Premier" },
  ];

  function startYearFromRow(d) {
    if (d.start && String(d.start).trim()) {
      const t = new Date(d.start);
      if (!isNaN(+t)) return t.getFullYear();
    }
    const y = +d.year;
    return !isNaN(y) ? y : NaN;
  }

  const parseRow = (d) => ({
    ...d,
    index_num: +d.index,
    group_order: +d.group_order || 0,
    duration: +d.duration,
    distance: +d.distance,
    date: new Date(d.start),
    year: +d.year,
    startYear: startYearFromRow({ ...d, year: +d.year }),
    leader_id: String(d.leader_id ?? "").trim(),
  });

  function officeForLeader(leaderName) {
    const m = LEADER_ROSTER.find((x) => x.leader === leaderName);
    return m ? m.office : "Premier";
  }

  function groupRectFillForNode(d) {
    const o = String(d.data.office || "").trim();
    if (o === "President") return GROUP_RECT_FILL.President;
    if (o === "Premier") return GROUP_RECT_FILL.Premier;
    return officeForLeader(d.data.leader) === "President" ? GROUP_RECT_FILL.President : GROUP_RECT_FILL.Premier;
  }

  function buildHierarchy(data) {
    const byG = d3.group(data, (d) => d.global_id);
    const groups = [...byG.entries()].map(([gid, rows]) => {
      const sorted = [...rows].sort(
        (a, b) => a.group_order - b.group_order || a.index_num - b.index_num
      );
      const first = sorted[0];
      const office = String(first.office || "").trim() || officeForLeader(first.leader);
      return { gid, leader: first.leader, office, rows: sorted };
    });
    groups.sort((a, b) => {
      const ta = d3.min(a.rows, (r) => r.date.getTime());
      const tb = d3.min(b.rows, (r) => r.date.getTime());
      const na = Number.isNaN(ta);
      const nb = Number.isNaN(tb);
      if (na && nb) return 0;
      if (na) return 1;
      if (nb) return -1;
      if (ta !== tb) return ta - tb;
      return d3.min(a.rows, (r) => r.index_num) - d3.min(b.rows, (r) => r.index_num);
    });
    return {
      name: "__root__",
      leader: null,
      children: groups.map((g) => ({
        name: g.gid,
        leader: g.leader,
        office: g.office,
        leader_id: String(g.rows[0].leader_id ?? "").trim(),
        children: g.rows.map((r) => ({ ...r })),
      })),
    };
  }

  function leaderColor(leader) {
    return LEADER_COLORS[leader] || "#888";
  }

  function continentColor(c) {
    const k = (c || "").trim();
    return CONTINENT_COLORS[k] || "#777";
  }

  function gradientIdForContinent(c) {
    const k = String(c || "").trim();
    if (CONTINENT_COLORS[k]) return `ink-wash-${k.replace(/\s+/g, "")}`;
    return "ink-wash-Unknown";
  }

  /**
   * Same as Radial-area-chart: organic ink radial gradient in user space, mapped to [rInner, rOuter] ring.
   */
  function appendOrganicInkGradient(defs, id, baseHex, rPx, rInner, rOuter) {
    const innerCol = d3.rgb(d3.color(baseHex).darker(0.85));
    const paper = d3.rgb("#f4efe4");
    let seed = 2166136261;
    for (let i = 0; i < id.length; i++) seed = Math.imul(seed ^ id.charCodeAt(i), 16777619);
    const rnd = () => {
      seed = (Math.imul(seed ^ (seed >>> 15), 2246822519) ^ Math.imul(seed ^ (seed >>> 13), 3266489917)) >>> 0;
      return seed / 4294967296;
    };
    const nStops = 22;
    const raw = d3.range(nStops).map(() => 0.35 + rnd() * 0.9);
    const sum = d3.sum(raw) || 1;
    const tAlong = [0];
    let acc = 0;
    for (let i = 0; i < nStops; i++) {
      acc += raw[i] / sum;
      tAlong.push(i === nStops - 1 ? 1 : acc);
    }
    const interp = d3.interpolateRgb(innerCol, paper);
    const span = Math.max(1e-6, rOuter - rInner);
    const G = defs
      .append("radialGradient")
      .attr("id", id)
      .attr("gradientUnits", "userSpaceOnUse")
      .attr("cx", 0)
      .attr("cy", 0)
      .attr("r", rPx);

    tAlong.forEach((t) => {
      const d0 = rInner + t * span;
      const offsetPct = (d0 / rPx) * 100;
      const c0 = d3.rgb(interp(t));
      const j = (rnd() - 0.5) * 0.08;
      c0.r = Math.max(0, Math.min(255, c0.r + j * 55));
      c0.g = Math.max(0, Math.min(255, c0.g + j * 48));
      c0.b = Math.max(0, Math.min(255, c0.b + j * 42));
      const op = 0.88 + t * 0.1 + (rnd() - 0.5) * 0.06;
      G.append("stop")
        .attr("offset", `${offsetPct}%`)
        .attr("stop-color", c0.formatRgb())
        .attr("stop-opacity", Math.max(0.75, Math.min(1, op)));
    });
  }

  function appendPaperInkFilter(defs) {
    const F = defs
      .append("filter")
      .attr("id", "ink-xuan-paper")
      .attr("x", "-30%")
      .attr("y", "-30%")

      .attr("height", "160%")
      .attr("color-interpolation-filters", "sRGB");
    F.append("feTurbulence")
      .attr("type", "fractalNoise")
      .attr("baseFrequency", "0.014 0.022")
      .attr("numOctaves", 2)
      .attr("seed", 11)
      .attr("result", "n");
    F.append("feDisplacementMap")
      .attr("in", "SourceGraphic")
      .attr("in2", "n")
      .attr("scale", 0.45)
      .attr("xChannelSelector", "R")
      .attr("yChannelSelector", "G")
      .attr("result", "d");
    F.append("feGaussianBlur").attr("in", "d").attr("stdDeviation", 0.22).attr("result", "b");
    F.append("feMerge").append("feMergeNode").attr("in", "b");
  }

  function buildCountryBars(rows) {
    const valid = rows.filter((r) => (r.country || "").trim());
    const byCountry = d3.rollup(
      valid,
      (v) => ({
        count: v.length,
        continent: (v[0].Continent || "").trim(),
        ccode: (v[0].ccode || "").trim(),
        country: (v[0].country || "").trim(),
      }),
      (d) => (d.country || "").trim()
    );
    const entries = [...byCountry.entries()].map(([country, meta]) => ({
      country,
      ...meta,
    }));
    const continents = [...new Set(entries.map((e) => e.continent))].sort((a, b) =>
      a.localeCompare(b)
    );
    const out = [];
    for (const cont of continents) {
      const inCont = entries
        .filter((e) => e.continent === cont)
        .sort((a, b) => a.country.localeCompare(b.country));
      out.push(...inCont);
    }
    return out;
  }

  function sampleSegment(pathNode, s0, s1, steps) {
    const pts = [];
    for (let i = 0; i <= steps; i++) {
      const s = s0 + (i / steps) * (s1 - s0);
      const p = pathNode.getPointAtLength(s);
      pts.push([p.x, p.y]);
    }
    return d3.line()(pts);
  }

  function sampleSegmentOffset(pathNode, pathLen, s0, s1, steps, offsetPx) {
    const pts = [];
    const eps = Math.min(1.5, (s1 - s0) / 200 || 0.5);
    for (let i = 0; i <= steps; i++) {
      const s = s0 + (i / steps) * (s1 - s0);
      const p = pathNode.getPointAtLength(s);
      const sp = Math.max(0, s - eps);
      const sn = Math.min(pathLen, s + eps);
      const prev = pathNode.getPointAtLength(sp);
      const next = pathNode.getPointAtLength(sn);
      let dx = next.x - prev.x;
      let dy = next.y - prev.y;
      const len = Math.hypot(dx, dy) || 1;
      dx /= len;
      dy /= len;
      const nx = -dy;
      const ny = dx;
      pts.push([p.x + nx * offsetPx, p.y + ny * offsetPx]);
    }
    return d3.line()(pts);
  }

  function showTipHtml(html) {
    tip.innerHTML = html;
    tip.classList.add("visible");

  function moveTip(ev) {

    const ROSE_VERTEX_HALF = 5;

    const ROSE_VERTEX_STROKE = "#704f26";

    function dominantLeaderForSlice(year, office) {
      const m = visitRows.filter((r) => r.startYear === year && r.office === office);

    function dominantLeaderForYear(year) {

      if (!m.length) return null;
      const byL = d3.rollup(m, (v) => v.length, (r) => r.leader);
      const top = [...byL.entries()].sort((a, b) => b[1] - a[1])[0];
      const name = top && top[0] != null ? String(top[0]).trim() : "";
      return name || null;
    }

    defs
      .append("radialGradient")
      .attr("id", "rosePaperEmbed")
      .attr("cx", "30%")
      .attr("cy", "30%")
      .attr("r", "75%")
      .call((g) => {
        g.append("stop").attr("offset", "0%").attr("stop-color", "#fffcfa");
